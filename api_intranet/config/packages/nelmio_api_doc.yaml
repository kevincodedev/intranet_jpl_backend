nelmio_api_doc:
    documentation:
        info:
            title: API Intranet
            description: API REST principal
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - Bearer: []
        paths:
            /api/login:
                post:
                    tags: [Autenticación]
                    summary: Iniciar sesión y obtener token JWT
                    security: []
                    requestBody:
                        content:
                            application/json:
                                schema:
                                    type: object
                                    properties:
                                        email: { type: string, example: admin@intranet.com }
                                        password: { type: string, example: mi_password_seguro }
                    responses:
                        '200':
                            description: Token generado exitosamente
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            token: { type: string }
            /reset-password:
                post:
                    tags: [Recuperación de contraseña]
                    summary: Solicitar enlace de restablecimiento de contraseña
                    security: []
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    type: object
                                    required: [email]
                                    properties:
                                        email: { type: string, example: user@intranet.com }
                    responses:
                        '200':
                            description: Correo enviado si el email existe
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            message: { type: string }
                        '400':
                            description: Email inválido
            /reset-password/reset/{token}:
                post:
                    tags: [Recuperación de contraseña]
                    summary: Restablecer contraseña usando el token del email
                    security: []
                    parameters:
                        - name: token
                          in: path
                          required: true
                          schema: { type: string }
                          description: Token recibido en el enlace del correo
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    type: object
                                    required: [plainPassword]
                                    properties:
                                        plainPassword:
                                            type: object
                                            properties:
                                                first: { type: string, example: nuevaPassword123 }
                                                second: { type: string, example: nuevaPassword123 }
                    responses:
                        '200':
                            description: Contraseña actualizada correctamente
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            message: { type: string }
                        '400':
                            description: Token inválido o contraseñas no coinciden
            /api/token/refresh:
                post:
                    tags: [Autenticación]
                    summary: Refrescar token JWT usando un refresh_token
                    security: []
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    type: object
                                    required: [refresh_token]
                                    properties:
                                        refresh_token: { type: string, example: "abcdef1234567890..." }
                    responses:
                        '200':
                            description: Nuevo token JWT generado
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            token: { type: string }
                                            refresh_token: { type: string }
                        '401':
                            description: Refresh token inválido o expirado

    areas:
        path_patterns:
            - ^/api(?!/doc$)  # All /api routes except /api/doc itself