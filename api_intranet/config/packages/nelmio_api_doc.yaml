nelmio_api_doc:
    documentation:
        info:
            title: API Intranet
            description: API REST principal
            version: 1.0.0
        components:
            securitySchemes:
                Bearer:
                    type: http
                    scheme: bearer
                    bearerFormat: JWT
        security:
            - Bearer: []
        paths:
            /api/login:
                post:
                    tags: [Autenticación]
                    summary: Iniciar sesión y obtener token JWT
                    security: []
                    requestBody:
                        content:
                            application/json:
                                schema:
                                    type: object
                                    properties:
                                        email: { type: string, example: admin@intranet.com }
                                        password: { type: string, example: mi_password_seguro }
                    responses:
                        '200':
                            description: Token generado exitosamente
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            token: { type: string }
            /api/token/refresh:
                post:
                    tags: [Autenticación]
                    summary: Refrescar token JWT usando un refresh_token
                    security: []
                    requestBody:
                        required: true
                        content:
                            application/json:
                                schema:
                                    type: object
                                    required: [refresh_token]
                                    properties:
                                        refresh_token: { type: string, example: "abcdef1234567890..." }
                    responses:
                        '200':
                            description: Nuevo token JWT generado
                            content:
                                application/json:
                                    schema:
                                        type: object
                                        properties:
                                            token: { type: string }
                                            refresh_token: { type: string }
                        '401':
                            description: Refresh token inválido o expirado

    areas:
        path_patterns:
            - ^/api(?!/doc$)  # All /api routes except /api/doc itself